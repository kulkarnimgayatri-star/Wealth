<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Finance Manager - Sign Up</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-container auth-logo">
                <img src="/static/images/logo.png" alt="AI Finance Manager Logo" class="logo">
                <span class="brand-name">Money Pilot</span>
            </div>

            <h2 class="auth-title">Create an Account</h2>
            <p class="auth-subtitle">Start managing your wealth smarter today</p>

            <form id="signup-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••"
                        required>
                </div>

                <div id="error-message" style="color: #ff4d4d; margin-bottom: 1rem; display: none;"></div>

                <button type="submit" class="btn-submit">Sign Up</button>
            </form>

            <script>
                document.getElementById('signup-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const name = document.getElementById('name').value;
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const confirmPassword = document.getElementById('confirm-password').value;
                    const errorDiv = document.getElementById('error-message');

                    if (password !== confirmPassword) {
                        errorDiv.textContent = 'Passwords do not match';
                        errorDiv.style.display = 'block';
                        return;
                    }

                    try {
                        const response = await fetch('/api/signup', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name, email, password })
                        });
                        const data = await response.json();
                        if (data.status === 'success') {
                            window.location.href = '/dashboard';
                        } else {
                            errorDiv.textContent = data.message;
                            errorDiv.style.display = 'block';
                        }
                    } catch (err) {
                        errorDiv.textContent = 'Something went wrong. Please try again.';
                        errorDiv.style.display = 'block';
                    }
                });
            </script>

            <div class="auth-footer">
                <p>Already have an account? <a href="/login">Sign in</a></p>
            </div>
        </div>
    </div>
</body>

</html>
